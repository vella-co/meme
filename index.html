<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vella Co. | Premium Fashion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f4f4f4; padding-bottom: 60px; }
        
        .banner { background: #ffd700; padding: 20px; text-align: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
        
        #details-page, #cart-page, #order-modal { display: none; }
        #details-page, #cart-page { background: white; padding: 20px; min-height: 100vh; }
        .detail-img { width: 100%; height: 300px; object-fit: cover; }
        .btn { display: block; width: 100%; padding: 15px; background: #000; color: #fff; text-align: center; margin-top: 10px; border: none; cursor: pointer; font-weight: bold; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; margin-top: 50px; }
        #order-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); padding: 20px; }
    </style>
</head>
<body>

<div class="banner">2000 Coins FREE for New Users!</div>

<div id="home-page">
    <div class="grid" id="product-grid"></div>
    <div style="text-align: center; padding: 20px;">
        <button onclick="showPage(1)">1</button> <button onclick="showPage(2)">2</button>
    </div>
</div>

<div id="details-page">
    <button onclick="location.reload()">⬅ Back</button>
    <img id="d-img" class="detail-img">
    <h2 id="d-name"></h2>
    <p>Color: <select><option>Black</option><option>White</option></select></p>
    <p>Size: <select><option>S</option><option>M</option><option>L</option></select></p>
    <button class="btn" onclick="addToCart()">Add to Cart</button>
    <h3>Similar Products</h3>
    <div class="grid" id="similar-grid"></div>
</div>

<div id="cart-page">
    <button onclick="location.reload()">⬅ Back</button>
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <button class="btn" onclick="document.getElementById('order-modal').style.display='block'">Order Now</button>
</div>

<div id="order-modal">
    <div class="modal-box">
        <h3>Enter Details</h3>
        <input id="name" placeholder="Name" style="width:100%; padding:10px; margin:5px 0;">
        <input id="phone" placeholder="Mobile Number" style="width:100%; padding:10px; margin:5px 0;">
        <textarea id="addr" placeholder="Address" style="width:100%; padding:10px; margin:5px 0;"></textarea>
        <button class="btn" onclick="placeOrder()">Submit Order</button>
    </div>
</div>

<script>
const products = [
    {id:1, name:"Polo T-Shirt", img:"https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=300"},
    {id:2, name:"Round Neck", img:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=300"},
    {id:3, name:"V-Neck Tee", img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=300"},
    {id:4, name:"Premium Polo", img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=300"},
    {id:5, name:"Black Graphic", img:"https://images.unsplash.com/photo-1503341455253-b2bc71f093b1?w=300"},
    {id:6, name:"Blue Striped", img:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10?w=300"},
    {id:7, name:"Charcoal Tee", img:"https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=300"},
    {id:8, name:"Navy Blue", img:"https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=300"},
    {id:9, name:"Pink Luxury", img:"https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=300"},
    {id:10, name:"Yellow Polo", img:"https://images.unsplash.com/photo-1562157873-818bc0726f68?w=300"},
    {id:11, name:"Crimson Red", img:"https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=300"},
    {id:12, name:"Forest Green", img:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=300"}
];

let cart = [];
let currentProduct = null;

function showPage(p) {
    const grid = document.getElementById('product-grid');
    const start = (p-1)*6;
    grid.innerHTML = products.slice(start, start+6).map(i => `
        <div class="card" onclick="viewDetails(${i.id})">
            <img src="${i.img}">
            <p>${i.name}</p>
        </div>
    `).join('');
}

function viewDetails(id) {
    currentProduct = products.find(p => p.id === id);
    document.getElementById('d-img').src = currentProduct.img;
    document.getElementById('d-name').innerText = currentProduct.name;
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('details-page').style.display = 'block';
    document.getElementById('similar-grid').innerHTML = products.filter(p => p.id !== id).slice(0,2).map(i => `
        <div class="card" onclick="viewDetails(${i.id})">
            <img src="${i.img}">
        </div>
    `).join('');
}

function addToCart() {
    cart.push(currentProduct);
    alert('Added to Cart!');
    document.getElementById('details-page').style.display = 'none';
    document.getElementById('cart-page').style.display = 'block';
    document.getElementById('cart-items').innerHTML = cart.map(i => `<p>✅ ${i.name}</p>`).join('');
}

function placeOrder() {
    const n = document.getElementById('name').value;
    const m = document.getElementById('phone').value;
    const a = document.getElementById('addr').value;
    if(n && m && a) {
        window.open(`https://wa.me/919999999999?text=Order: ${cart.map(i=>i.name).join(', ')}%0AName: ${n}%0AMob: ${m}%0AAddr: ${a}`);
    } else { alert("Fill all details!"); }
}

// Page load par pehla page dikhaye
showPage(1);
</script>
</body>
</html>

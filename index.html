<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELLA CO. | Premium Streetwear</title>
    <style>
        /* --- CSS: PREMIUM LUXURY MINIMALIST --- */
        :root { --bg: #ffffff; --text: #000000; --accent: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 25px 8%; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .nav-links a { margin-left: 30px; text-decoration: none; color: black; font-weight: 500; font-size: 14px; text-transform: uppercase; }
        
        /* Hero */
        .hero { padding: 100px 8%; text-align: center; }
        .hero h1 { font-size: 5rem; font-weight: 900; margin-bottom: 20px; }
        
        /* Products */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding: 0 8% 80px 8%; }
        .card { border: 1px solid #f0f0f0; padding: 10px; cursor: pointer; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card h3 { margin: 15px 0 5px; font-weight: 600; }
        .card .price { font-size: 18px; color: #555; }
        .card button { width: 100%; padding: 15px; margin-top: 15px; background: black; color: white; border: none; cursor: pointer; font-weight: bold; }
        .card button:hover { background: #333; }
        
        /* Footer */
        footer { padding: 80px 8%; background: #f9f9f9; text-align: center; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px; }
        .footer-links a { display: block; color: #666; margin: 10px 0; text-decoration: none; }
        
        .drawer { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; border-left: 1px solid #eee; padding: 30px; transition: 0.5s; z-index: 2000; box-shadow: -5px 0 20px rgba(0,0,0,0.05); }
        .drawer.open { right: 0; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VELLA CO.</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#shop">Shop</a>
            <a href="#" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</a>
        </div>
    </nav>

    <section class="hero">
        <h1>THE ESSENTIALS</h1>
        <p>Premium quality streetwear for the modern individual.</p>
    </section>

    <section id="shop" class="grid" id="product-container"></section>

    <footer>
        <div class="footer-grid">
            <div><h4>ABOUT US</h4><p>VELLA CO. is a premium fashion brand focusing on minimalism.</p></div>
            <div><h4>POLICIES</h4><a href="#">Privacy Policy</a><a href="#">Return Policy</a></div>
            <div><h4>CONTACT</h4><p>support@vellaco.com</p></div>
        </div>
        <p>&copy; 2026 VELLA CO. All Rights Reserved.</p>
    </footer>

    <div id="cart-drawer" class="drawer">
        <h2>YOUR CART</h2>
        <div id="cart-items"></div>
        <button onclick="checkout()" style="width:100%; padding: 15px; background:black; color:white; border:none; margin-top:20px;">CHECKOUT ON WHATSAPP</button>
    </div>

    <script>
        const products = [
            { id: 1, name: "Oversized Black Tee", price: 1299, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
            { id: 2, name: "Premium White Hoodie", price: 2499, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500" },
            { id: 3, name: "Streetwear Cargo Pants", price: 1999, img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=500" },
            { id: 4, name: "Graphic Vintage Tee", price: 1499, img: "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=500" },
            { id: 5, name: "Heavyweight Sweatshirt", price: 1799, img: "https://images.unsplash.com/photo-1554568218-0f1715e72254?w=500" },
            { id: 6, name: "Minimalist Denim Jacket", price: 3499, img: "https://images.unsplash.com/photo-1523205771623-e0faa4d2813d?w=500" },
            { id: 7, name: "Techwear Vest", price: 2299, img: "https://images.unsplash.com/photo-1516826957135-700dedea698c?w=500" },
            { id: 8, name: "Classic Track Pants", price: 1599, img: "https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=500" },
            { id: 9, name: "Urban Bomber Jacket", price: 3999, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 10, name: "Longline Layering Tee", price: 999, img: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=500" },
            { id: 11, name: "Premium Beanie", price: 599, img: "https://images.unsplash.com/photo-1576871337632-b9aef4c17ab9?w=500" },
            { id: 12, name: "Luxury Crossbody Bag", price: 2199, img: "https://images.unsplash.com/photo-1590874103328-e638a600883c?w=500" }
        ];

        function init() {
            const container = document.getElementById('shop');
            container.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">₹${p.price}</p>
                    <button onclick="addToCart(${p.id})">ADD TO CART</button>
                </div>
            `).join('');
        }

        let cart = JSON.parse(localStorage.getItem('vellaCart')) || [];

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push(p);
            localStorage.setItem('vellaCart', JSON.stringify(cart));
            updateCart();
            alert("Added " + p.name + " to cart!");
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = cart.map(i => `<p>${i.name} - ₹${i.price}</p>`).join('');
        }

        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }

        function checkout() {
            const msg = `Order from VELLA CO:\n` + cart.map(i => i.name).join(', ');
            window.location.href = `https://wa.me/919876543210?text=${encodeURIComponent(msg)}`;
        }

        init();
        updateCart();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELLA CO. | Premium Streetwear</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', sans-serif; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; padding: 20px 5%; position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #eee; }
        
        /* Grid & Cards */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 50px 5%; }
        .product-card { border: 1px solid #eee; padding: 15px; text-align: center; }
        .product-card img { width: 100%; height: 300px; object-fit: cover; margin-bottom: 15px; }
        
        /* Footer */
        footer { padding: 50px 5%; background: #f9f9f9; text-align: center; margin-top: 50px; }
        .footer-links { margin-bottom: 20px; }
        .footer-links a { margin: 0 10px; color: #666; text-decoration: none; font-size: 14px; }
        
        .drawer { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; border-left: 1px solid #eee; padding: 30px; transition: 0.5s; z-index: 2000; }
        .drawer.open { right: 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>VELLA CO.</strong></div>
        <div>
            <a href="#" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</a>
        </div>
    </nav>

    <section id="shop" class="product-grid">
        <!-- Product Card Example -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="T-Shirt">
            <h3>Premium Black Tee</h3>
            <p>₹1,299</p>
            <button onclick="addToCart('Premium Black Tee', 1299)">ADD TO CART</button>
        </div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="#">About Us</a> | 
            <a href="#">Privacy Policy</a> | 
            <a href="#">Terms of Service</a>
        </div>
        <p>&copy; 2026 VELLA CO. All Rights Reserved.</p>
    </footer>

    <div id="cart-drawer" class="drawer">
        <h2>YOUR CART</h2>
        <div id="cart-items" style="margin: 20px 0;"></div>
        <button onclick="checkout()" style="width:100%; padding:15px; background:black; color:white; border:none;">WHATSAPP ORDER</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('vellaCart')) || [];

        function addToCart(name, price) {
            cart.push({name, price});
            localStorage.setItem('vellaCart', JSON.stringify(cart));
            updateCart();
            alert("Added to cart!");
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(item => `<p>${item.name} - ₹${item.price}</p>`).join('');
        }

        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }

        function checkout() {
            const msg = `Hello VELLA CO., I want to order: ${cart.map(i => i.name).join(', ')}`;
            window.location.href = `https://wa.me/919876543210?text=${encodeURIComponent(msg)}`;
        }

        updateCart();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELLA CO. | Luxury Streetwear</title>
    <style>
        /* BASE STYLES */
        :root { --primary: #000; --white: #fff; --grey: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', sans-serif; }
        html { scroll-behavior: smooth; }
        
        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; position: sticky; top: 0; background: var(--white); z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; }
        .nav-icons { display: flex; gap: 15px; }

        /* HERO */
        .hero { text-align: center; padding: 80px 20px; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .btn-shop { padding: 15px 40px; background: var(--primary); color: var(--white); border: none; cursor: pointer; margin-top: 20px; }

        /* PRODUCT GRID */
        .product-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 5%; }
        .product-card { border: 1px solid #eee; padding: 15px; border-radius: 15px; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; }
        .badge { background: black; color: white; padding: 5px 10px; font-size: 12px; position: absolute; margin: 10px; }

        /* FLOATING BUTTONS */
        .float-whatsapp { position: fixed; bottom: 80px; right: 20px; background: #25D366; color: white; padding: 15px; border-radius: 50%; z-index: 1000; }
        .float-top { position: fixed; bottom: 20px; right: 20px; background: black; color: white; padding: 15px; border-radius: 50%; z-index: 1000; }

        /* FOOTER */
        footer { padding: 50px 5%; background: var(--grey); text-align: center; }
        .footer-social { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VELLA CO.</div>
        <div class="nav-icons">
            <span onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</span>
            <span>☰</span>
        </div>
    </nav>

    <section class="hero">
        <h1>VELLA CO.</h1>
        <p>Minimal Streetwear Collection crafted for the luxury generation.</p>
        <button class="btn-shop" onclick="document.getElementById('shop').scrollIntoView()">Shop Now</button>
    </section>

    <section id="shop" class="product-container"></section>

    <footer>
        <div class="footer-social">
            <p>Instagram | WhatsApp | Telegram</p>
        </div>
        <p>&copy; 2026 VELLA CO. All Rights Reserved.</p>
    </footer>

    <!-- Floating Action Buttons -->
    <a href="https://wa.me/919876543210" class="float-whatsapp">WA</a>
    <button class="float-top" onclick="window.scrollTo(0,0)">↑</button>

    <script>
        const products = [
            { id: 1, name: "Oversized Black Hoodie", price: 2499, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
            { id: 2, name: "Premium Bomber Jacket", price: 4299, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" }
        ];

        function renderProducts() {
            const container = document.getElementById('shop');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <span class="badge">20% OFF</span>
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p>₹${p.price}</p>
                    <button onclick="addToCart(${p.id})" style="width:100%; padding:10px; margin-top:10px;">Add to Cart</button>
                </div>
            `).join('');
        }

        let cart = JSON.parse(localStorage.getItem('vellaCart')) || [];
        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            localStorage.setItem('vellaCart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            alert("Added to cart!");
        }

        renderProducts();
    </script>
</body>
</html>
